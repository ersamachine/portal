<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>

<style>
:root{--red:#C51515;--redsoft:#2C2C2C;--ink:#FFFFFF;--black:#181818;--bg:#111111;--soft:#2C2C2C;--line:#383838;--muted:#8A8A8A;--muted2:#5A5A5A;--gold:#F5A623;--green:#2ED573;--blue:#5B8DEF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.disp{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;background:#0B0B0B;min-height:100vh;min-height:100dvh;display:flex;align-items:stretch;justify-content:center;padding:0;}
.phone{width:100%;max-width:100%;height:100vh;height:100dvh;background:var(--bg);border-radius:0;padding:0;box-shadow:none;}
.inner{width:100%;height:100%;background:var(--bg);border-radius:0;overflow:hidden;display:flex;flex-direction:column;position:relative;color:#CFCFCF;}
/* tablet/bilgisayar: telefon çerçevesi yok; tam yükseklikte, ortalı, geniş web-app paneli */
@media(min-width:600px){body{align-items:center;background:#0B0B0B;}.phone{max-width:620px;height:100dvh;max-height:none;box-shadow:0 0 70px rgba(0,0,0,.55);}.island{display:none;}}
.sbar{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 22px 0;font-size:11px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.island{width:58px;height:15px;background:#0e0e0e;border-radius:11px;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;}.scr::-webkit-scrollbar{width:0;}
.pad{padding:6px 16px 104px;}
.tap{transition:transform .12s ease;cursor:pointer;}.tap:active{transform:scale(.97);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sh{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fd{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.stg>*{animation:su .4s cubic-bezier(.2,.7,.2,1) both;}
.stg>*:nth-child(2){animation-delay:.05s}.stg>*:nth-child(3){animation-delay:.1s}.stg>*:nth-child(4){animation-delay:.15s}.stg>*:nth-child(5){animation-delay:.2s}.stg>*:nth-child(6){animation-delay:.25s}
.h1{font-weight:700;font-size:22px;color:var(--ink);}
.sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
.sec{font-weight:700;font-size:14.5px;color:var(--ink);margin:18px 0 10px;}
.c{background:#202020;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.blk{background:var(--black);color:#fff;border-radius:22px;}
.ct{font-weight:700;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs{font-size:11px;color:var(--muted);margin-top:1px;}
.circ{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sq{width:33px;height:33px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;}
.chip-r{background:var(--red);color:#fff;}.chip-g{background:#1F9D52;color:#fff;}.chip-n{background:#2C2C2C;color:#CFCFCF;}.chip-b{background:#2F6FE0;color:#fff;}.chip-o{background:var(--gold);color:#181818;}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:15px;padding:14px;font-size:14.5px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;box-shadow:0 8px 20px rgba(197,21,21,.28);}
.btng{width:100%;background:#202020;color:var(--ink);border:1.5px solid var(--line);border-radius:15px;padding:12px;font-size:13.5px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
.bignum{font-weight:800;font-variant-numeric:tabular-nums;}
.back{display:inline-flex;align-items:center;gap:2px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.line{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;}
.divh{border-top:1px solid var(--line);margin:9px 0;}
.field{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14.5px;color:var(--ink);background:#202020;margin-bottom:12px;outline:none;font-family:inherit;}
.opt2.on{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important;box-shadow:0 3px 10px rgba(197,21,21,.4);}
.ibtab{font-size:11px;font-weight:800;padding:5px 11px;border-radius:8px;background:#242424;color:var(--muted);cursor:pointer;transition:.15s;}
.ibtab.on{background:var(--red);color:#fff;box-shadow:0 3px 9px rgba(197,21,21,.4);}
.amt{display:flex;align-items:center;background:#1b1b1b;border:1px solid #2c2c2c;border-radius:13px;padding:0 14px;height:52px;margin-bottom:8px;}
.amt .cur{color:var(--muted);font-size:16px;margin-right:8px;flex-shrink:0;}
.amt input{flex:1;background:none;border:none;outline:none;font-size:17px;font-weight:700;color:#fff;min-width:0;font-family:inherit;}
.amt .eq{font-size:13.5px;color:var(--green);font-weight:700;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.ratel{font-size:11.5px;color:#a8a8a8;margin:7px 0 0 2px;}
.ratel b{color:#fff;font-weight:700;}
.payform .lbl{margin:13px 0 7px;}
.payform .lbl:first-of-type{margin-top:2px;}
.payform .field{margin-bottom:0;}
.payform .amt{margin-bottom:0;}
.payform .btnred{margin-top:16px;}
.seg{display:flex;background:#141414;border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;}
.seg .opt2{flex:1;text-align:center;padding:11px 6px;border-radius:9px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;transition:.15s;border:none;background:transparent;}
.two{display:flex;gap:10px;}
.two>div{flex:1;min-width:0;}
.payform .two{margin-top:13px;}
.payform .two .lbl{margin-top:0;}
.payform .c{margin-top:13px;}
.field::placeholder{color:var(--muted2);}
select.field{appearance:none;-webkit-appearance:none;}
.lbl{display:block;font-size:12.5px;font-weight:700;color:#C8C8C4;margin:0 0 6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 4px;border-radius:15px;background:#202020;border:1px solid #2A2A2A;cursor:pointer;transition:transform .12s;}
.tile:active{transform:scale(.96);}.tile span{font-size:10px;font-weight:600;color:#CFCFCF;text-align:center;line-height:1.2;}
i.ic{display:inline-flex;}i.ic svg{display:block;}
.navwrap{position:absolute;left:0;right:0;bottom:0;min-height:64px;background:#181818;border-top:1px solid var(--line);box-shadow:0 -6px 20px rgba(0,0,0,.5);display:flex;align-items:flex-start;padding:9px 14px calc(9px + env(safe-area-inset-bottom));}
.nslot{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}.nslot span{font-size:9.5px;font-weight:600;color:var(--muted);}.nslot.on span{color:var(--red);font-weight:700;}
.ovl{position:absolute;inset:0;background:rgba(15,15,15,.6);z-index:60;display:flex;align-items:flex-end;animation:fd .2s;}
.sheet{width:100%;background:#202020;border-radius:24px 24px 0 0;padding:18px 18px 26px;animation:sh .28s cubic-bezier(.2,.8,.2,1);max-height:90%;overflow-y:auto;}
.sheet::-webkit-scrollbar{width:0;}
.sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.sheettitle{font-weight:700;font-size:17px;color:#fff;}
.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);background:#181818;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:24px;z-index:80;animation:pop .25s;white-space:nowrap;border:1px solid var(--line);max-width:80%;text-align:center;}
.empty{text-align:center;color:var(--muted);padding:30px 14px;font-size:12.5px;}
.banner{background:#2A1810;color:var(--gold);border:1px solid #4a2c12;border-radius:14px;padding:13px 15px;font-size:12.5px;font-weight:600;margin-top:10px;}
.infobox{background:var(--redsoft);border-radius:13px;padding:11px 13px;margin-bottom:14px;font-size:11.5px;color:#FF8A80;display:flex;gap:8px;align-items:flex-start;line-height:1.45;}
.login{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:34px 26px;}
.login .logo{width:100%;max-width:236px;margin:0 auto 6px;display:block;}
.login .lt{text-align:center;font-size:12.5px;color:var(--muted);letter-spacing:2.5px;font-weight:700;margin-bottom:30px;}
.login .lerr{color:#FF6B5E;font-size:12.5px;text-align:center;margin-top:10px;min-height:16px;}
.rememberbox{display:flex;align-items:center;gap:9px;margin:2px 0 18px;cursor:pointer;color:#CFCFCF;font-size:13px;font-weight:600;}
.rememberbox input{width:18px;height:18px;accent-color:var(--red);}
.prog{height:7px;background:#2a2a2a;border-radius:6px;overflow:hidden;margin-top:9px;}.prog>div{height:100%;background:var(--green);border-radius:6px;}
.lrow{display:flex;align-items:center;gap:11px;padding:13px 0;border-top:1px solid var(--line);}.lrow:first-child{border-top:none;}
.codebox{background:#11271A;border:1px solid #1F9D52;border-radius:12px;padding:11px 13px;margin-top:10px;text-align:center;}
.codebox .cv{font-size:21px;font-weight:800;color:#2ED573;letter-spacing:3px;font-variant-numeric:tabular-nums;}
.addphoto{width:64px;height:64px;border:1.5px dashed var(--muted2);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);}
.addphoto span{font-size:8.5px;}
.photothumb{width:64px;height:64px;border-radius:14px;border:1px solid var(--line);background-size:cover;background-position:center;}
.okwrap{position:relative;height:100px;display:flex;align-items:center;justify-content:center;}
.okcirc{position:relative;width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pop .45s cubic-bezier(.2,1.5,.4,1) both, ring 1.1s ease-out .25s;}
.okbadge{position:absolute;right:-3px;bottom:-3px;width:32px;height:32px;border-radius:50%;background:#1F9D52;border:3px solid #202020;display:flex;align-items:center;justify-content:center;animation:pop .4s .4s both;}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(46,213,115,.5)}100%{box-shadow:0 0 0 30px rgba(46,213,115,0)}}
.cf{position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:2px;opacity:0;animation:cf .85s ease-out forwards;}
@keyframes cf{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.3)}}
.tl{position:relative;}
.dbadge{width:46px;height:48px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.dbadge .mo{font-size:9px;font-weight:800;letter-spacing:.5px;}
.dbadge .dy{font-size:17px;font-weight:800;line-height:1;}
.trow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #2a2a2a;}
.trow:last-child{border-bottom:none;}
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.qtile{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;opacity:0;animation:qIn .55s cubic-bezier(.2,.75,.25,1) forwards;-webkit-tap-highlight-color:transparent;}
@keyframes qIn{from{opacity:0;transform:translateY(16px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
.qwrap{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .28s;animation:qFloat 4s ease-in-out infinite;}
.qwrap::after{content:"";position:absolute;top:-60%;left:-120%;width:60%;height:220%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.16),transparent);transform:rotate(8deg);animation:qSheen 6s ease-in-out infinite;}
@keyframes qFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes qSheen{0%,72%{left:-120%;}86%{left:130%;}100%{left:130%;}}
.qtile:active .qwrap{transform:scale(.92);}
@media(hover:hover){.qtile:hover .qwrap{transform:translateY(-4px) scale(1.05);}.qtile:hover .qwrap i.ic svg{transform:scale(1.12);}}
.qtile span{font-size:10.5px;font-weight:600;color:#D6D6D6;text-align:center;letter-spacing:.2px;}
.qwrap i.ic{position:relative;z-index:2;}.qwrap i.ic svg{transition:transform .28s;}
.qtile.pay .qwrap{animation:qFloat 4s ease-in-out infinite, qPulse 2.4s ease-in-out infinite;}
@keyframes qPulse{0%,100%{box-shadow:0 0 0 0 rgba(46,213,115,0);}50%{box-shadow:0 0 0 7px rgba(46,213,115,.13);}}
.payhero{margin-top:14px;border-radius:18px;overflow:hidden;}
.payhero .btn{width:100%;border:none;border-radius:13px;padding:12px;font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
.btngold{background:var(--gold);color:#1a1a1a;box-shadow:0 8px 20px rgba(245,166,35,.25);}
.donut{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hole{width:44px;height:44px;border-radius:50%;background:#202020;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tchips{display:flex;gap:7px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none;}
.tchips::-webkit-scrollbar{display:none;}
.tchip{flex:0 0 auto;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;background:#1b1b1b;border:1px solid #262626;color:#8A8A8A;cursor:pointer;white-space:nowrap;}
.tchip.on{background:#fff;color:#111;border-color:#fff;}
.divr{height:1px;background:#2f2f2f;margin:13px 0 11px;}
.tlrow{display:flex;gap:13px;position:relative;padding-bottom:20px;}
.tlrow:last-child{padding-bottom:0;}
.tldot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;font-weight:800;font-size:12px;}
.tlline{position:absolute;left:14px;top:30px;bottom:-2px;width:2px;}
.tltxt{padding-top:5px;}
.tltitle{font-weight:700;font-size:13.5px;}
.tldate{font-size:11px;color:var(--muted);margin-top:2px;}
.tl .done .tldot{background:#1F9D52;color:#fff;}.tl .done .tlline{background:#1F9D52;}.tl .done .tltitle{color:#cfcfcf;}
.tl .cur .tldot{background:var(--red);color:#fff;box-shadow:0 0 0 4px rgba(197,21,21,.25);}.tl .cur .tlline{background:#3a3a3a;}.tl .cur .tltitle{color:#fff;}
.tl .todo .tldot{background:#2A2A2A;color:#6A6A6A;border:1px solid #3a3a3a;}.tl .todo .tlline{background:#2f2f2f;}.tl .todo .tltitle{color:#7a7a7a;}
@media (display-mode:standalone),(display-mode:fullscreen),(max-width:560px){
html{height:100%;overflow:hidden;}
body{padding:0;background:#111111;align-items:stretch;justify-content:stretch;height:100svh;min-height:0;overflow:hidden;}
.phone{width:100%;height:100svh;max-width:none;border-radius:0;padding:0;box-shadow:none;background:#111111;}
.inner{border-radius:0;padding-top:calc(env(safe-area-inset-top) + 8px);}
.sbar{display:none;}
}
@media print{ body{background:#fff!important;} body *{visibility:hidden!important;} #makbuzPrint, #makbuzPrint *{visibility:visible!important;} #makbuzPrint{position:absolute!important;left:0;top:0;width:100%;box-shadow:none!important;} .navwrap,.back,.btnred{display:none!important;} }
</style></head>

function getRead(){try{return JSON.parse(localStorage.getItem("ersa_portal_read")||"{}");}catch(e){return {};}}
function buildNotifs(){
 const d=S.data||{},out=[];
 (d.bildirimler||[]).forEach((b,i)=>{const v=money(b.tutar,b.pb==='TL'?'₺':'$');
  if(b.durum==='Onaylandı')out.push({k:'odeme',ic:'check',bg:'#11271A',col:'#2ED573',t:'Ödemeniz onaylandı',s:v+' · Makbuzu görün',time:b.zaman,act:'makbuz',av:i});
  else if(b.durum==='Reddedildi')out.push({k:'odeme',ic:'x',bg:'#2A1414',col:'#FF6B5E',t:'Ödeme bildiriminiz onaylanmadı',s:v,time:b.zaman});});
 (d.sifreler||[]).forEach(s=>{if(s.durum==='Verildi')out.push({k:'sifre',ic:'lock',bg:'#192639',col:'#5B8DEF',t:'Makine şifreniz verildi',s:(s.makine||'')+' · Makine sekmesinde görün',time:s.zaman});});
 (d.teklifler||[]).forEach(t=>{if((t.durum||'').toLowerCase().indexOf('yan')===0)out.push({k:'teklif',ic:'tag',bg:'#2C2410',col:'#F5A623',t:'Teklifiniz yanıtlandı',s:(t.urun||'Teklif'),time:t.zaman});});
 (d.servisler||[]).forEach(s=>{const dd=(s.durum||'').toLowerCase();if(dd.indexOf('işlem')===0||dd.indexOf('islem')===0)out.push({k:'servis',ic:'wrench',bg:'#2A1414',col:'#FF6B5E',t:'Servis talebiniz işleme alındı',s:(s.makine||''),time:s.zaman});else if(dd.indexOf('çöz')===0||dd.indexOf('coz')===0)out.push({k:'servis',ic:'check',bg:'#11271A',col:'#2ED573',t:'Servis talebiniz çözüldü',s:(s.makine||''),time:s.zaman});});
 out.forEach(n=>n.id=n.k+'|'+n.t+'|'+(n.time||''));
 out.sort((a,b)=>String(b.time||'').localeCompare(String(a.time||'')));
 const r=getRead();out.forEach(n=>n.read=!!r[n.id]);
 return out;
}
function unreadCount(){return buildNotifs().filter(n=>!n.read).length;}
function markAllRead(){const r=getRead();buildNotifs().forEach(n=>r[n.id]=1);try{localStorage.setItem("ersa_portal_read",JSON.stringify(r));}catch(e){}}

async function api(payload){
 const body=Object.assign({kod:S.kod,sifre:S.sifre},payload);
 const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
 return await r.json();
}
function saveCache(j){try{localStorage.setItem("ersa_portal_cache",JSON.stringify({kod:S.kod,data:j}));}catch(e){}}
function readCache(){try{const c=JSON.parse(localStorage.getItem("ersa_portal_cache")||"null");return (c&&c.kod===S.kod)?c.data:null;}catch(e){return null;}}
async function load(silent){
 if(!window.API_URL||String(API_URL).indexOf("YAPISTIRIN")>=0){S.err="config.js içine portal Apps Script adresini yazın.";render();return;}
 if(!silent){S.loading=true;render();}
 try{const j=await api({action:"data"});
  if(j.ok===false){ if(/kod|şifre|sifre/i.test(j.error||"")){doLogout(true);S.loginErr=j.error;render();return;} throw new Error(j.error||"Hata"); }
  S.data=j;S.err="";saveCache(j);
 }catch(e){ if(!silent) S.err="Bağlantı kurulamadı / adres hatalı."; }
 S.loading=false;
 if(!silent) render();
 else if(!S.success) render();   // arka plan: kutlama açıkken yeniden çizme (titreme/konfeti olmasın)
}
function toast(t){$("toasthost").innerHTML='<div class="toast">'+esc(t)+'</div>';setTimeout(()=>$("toasthost").innerHTML="",2000);}
function doLogout(silent){try{localStorage.removeItem("ersa_portal_auth");localStorage.removeItem("ersa_portal_cache");}catch(e){}S.authed=false;S.kod="";S.sifre="";S.data=null;S.tab="home";S.pushed=null;S.sheet=null;if(!silent)render();}

/* ---------- giriş ---------- */
function renderLogin(){
 $("scr").innerHTML='<div class="login"><img class="logo" src="logo-white.png" alt="ersa machinery"><div class="lt">MÜŞTERİ PORTALI</div>'
  +'<label class="lbl">Müşteri Kodu</label><input id="lkod" class="field" type="text" placeholder="Size verilen kod" autocapitalize="characters">'
  +'<label class="lbl">Şifre</label><input id="lsifre" class="field" type="password" placeholder="••••••••">'
  +'<label class="rememberbox"><input id="lrem" type="checkbox" checked> Beni hatırla</label>'
  +'<button class="btnred" id="lbtn" data-act="login">'+ic('check',16,'#fff')+' Giriş Yap</button>'
  +'<div class="lerr">'+esc(S.loginErr||"")+'</div>'
  +'<div style="text-align:center;font-size:11.5px;color:var(--muted2);margin-top:18px;line-height:1.5;">Kod ve şifrenizi firmamızdan temin edebilirsiniz.</div></div>';
 $("navhost").innerHTML="";$("sheethost").innerHTML="";
 const sp=$("lsifre");if(sp)sp.addEventListener("keydown",e=>{if(e.key==="Enter")$("lbtn").click();});
}

/* ---------- render ---------- */
function nav(){const it=[["home","Anasayfa","home"],["taleplerim","Taleplerim","file"],["makine","Makine","wrench"],["hesap","Hesap","user"]];
 const act=S.pushed?((S.pushed.t==='teklifDetay'||S.pushed.t==='talepDetay')?'taleplerim':(S.pushed.t==='cari'?'home':'home')):S.tab;
 return '<div class="navwrap">'+it.map(t=>'<div class="nslot '+(act===t[0]?'on':'')+'" data-act="tab" data-v="'+t[0]+'">'+ic(t[2],21,act===t[0]?'#C51515':'#8A8A8A')+'<span>'+t[1]+'</span></div>').join('')+'</div>';}
function render(){
 if(!S.authed){renderLogin();return;}
 let h;
 if(S.loading||!S.data){h='<div class="pad"><div class="empty" style="padding-top:150px;">'+ic('refresh',30,'#5A5A5A')+'<div style="margin-top:10px;">Yükleniyor…</div></div></div>';}
 else if(S.pushed){const p=S.pushed;h=p.t==='bildirimler'?bildirimlerView():p.t==='cari'?cariView():p.t==='taksitler'?taksitlerView():p.t==='odemelerim'?odemelerimView():p.t==='makbuz'?makbuzView(p.v):p.t==='teklifDetay'?teklifDetay(p.v):p.t==='talepDetay'?talepDetay(p.kind,p.v):p.t==='siparisler'?siparislerView():p.t==='siparisDetay'?siparisDetay(p.v):homeView();}
 else h=({home:homeView,taleplerim:taleplerimView,teklifler:taleplerimView,makine:makineView,hesap:hesapView}[S.tab]||homeView)();
 $("scr").innerHTML=h;
 $("navhost").innerHTML=(S.data&&!S.loading)?nav():"";
 $("sheethost").innerHTML=S.success?successSheet():(S.sheet?sheetForm():"");
 $("scr").scrollTop=0;
}

/* ---------- foto seçimi ---------- */
window.pickPhotos=function(e){
 const strip=document.getElementById('photostrip');const addlbl=document.querySelector('label[for="photofile"]');if(!strip)return;
 Array.prototype.forEach.call(e.target.files,function(f){
   if(window.PHOTOS.length>=4)return;
   const rd=new FileReader();
   rd.onload=function(){const img=new Image();img.onload=function(){
     const max=1100;let w=img.width,hh=img.height;if(w>max||hh>max){if(w>=hh){hh=Math.round(hh*max/w);w=max;}else{w=Math.round(w*max/hh);hh=max;}}
     const cv=document.createElement('canvas');cv.width=w;cv.height=hh;cv.getContext('2d').drawImage(img,0,0,w,hh);
     const data=cv.toDataURL('image/jpeg',0.62);window.PHOTOS.push(data);
     const t=document.createElement('div');t.className='photothumb';t.style.backgroundImage='url('+data+')';strip.insertBefore(t,addlbl);
   };img.src=rd.result;};rd.readAsDataURL(f);
 });e.target.value='';
};

/* ---------- olaylar ---------- */
$("app").addEventListener("click",async function(e){
 if(e.target.classList&&e.target.classList.contains("ovl")){ if(S.success){successGo();} S.sheet=null; render(); return; }
 const el=e.target.closest("[data-act]");if(!el)return;
 const a=el.getAttribute("data-act"),v=el.getAttribute("data-v");
 if(a==="tab"){S.tab=v;S.pushed=null;S.sheet=null;render();}
 else if(a==="push"){S.pushed={t:v};S.sheet=null;render();}
 else if(a==="back"){S.pushed=null;render();}
 else if(a==="talF"){S.talF=v;render();}
 else if(a==="talepAc"){const kind=el.getAttribute("data-kind");const i=+v;
   if(kind==="teklif"){S.pushed={t:"teklifDetay",v:i};}
   else if(kind==="odeme"){const b=(S.data.bildirimler||[])[i];if(b&&b.durum==="Onaylandı"){S.pushed={t:"makbuz",v:i};}else{S.pushed={t:"talepDetay",kind:"odeme",v:i};}}
   else {S.pushed={t:"talepDetay",kind:kind,v:i};}
   render();}
 else if(a==="teklifDetay"){S.pushed={t:"teklifDetay",v:+v};render();}
 else if(a==="siparisDetay"){S.pushed={t:"siparisDetay",v:+v};render();}
 else if(a==="makbuz"){S.pushed={t:"makbuz",v:+v};render();}
 else if(a==="makbuzyazdir"){try{window.print();}catch(e){toast("Yazdırma açılamadı");}}
 else if(a==="ekstrePdf"){S.ekstreTk=true;S.sheet="ekstrePdf";render();}
 else if(a==="ekstreTkToggle"){var _c=(S.ekstreTk!==false);S.ekstreTk=!_c;render();}
 else if(a==="ekstrePdfYap"){var _tk=(S.ekstreTk!==false);S.sheet=null;render();ekstrePdf(_tk);}
 else if(a==="open"){if(v==="teklif"||v==="sifre")window.PHOTOS=[];S.sheet=v;render();}
 else if(a==="chooser"){if(v==="sifre")window.PHOTOS=[];S.sheet=v;render();}
 else if(a==="close"){S.sheet=null;render();}
 else if(a==="ibansec"){ document.querySelectorAll(".ibtab").forEach(function(x){x.classList.remove("on");}); el.classList.add("on"); var iv=$("ibanval"),cp=$("ibancopy"),val=el.getAttribute("data-iban")||""; if(iv)iv.textContent=val; if(cp)cp.setAttribute("data-v",val); }
 else if(a==="copy"){const txt=el.getAttribute("data-v")||"";const done=()=>toast("Kopyalandı");try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,()=>toast("Kopyalanamadı"));}else{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();}}catch(e){toast("Kopyalanamadı");}}
 else if(a==="successok"){successGo();render();}
 else if(a==="readall"){markAllRead();render();}
 else if(a==="logout"){doLogout();}
 else if(a==="login"){
   const k=$("lkod").value.trim();const p=$("lsifre").value;const rem=$("lrem")&&$("lrem").checked;
   if(!k||!p){S.loginErr="Kod ve şifre girin.";render();return;}
   S.kod=k;S.sifre=p;el.style.opacity=".7";el.textContent="Kontrol ediliyor…";
   try{const j=await api({action:"data"});
     if(j.ok===false){S.loginErr=j.error||"Giriş başarısız.";S.kod="";S.sifre="";render();return;}
     if(rem){try{localStorage.setItem("ersa_portal_auth",JSON.stringify({kod:k,sifre:p}));}catch(e2){}}
     S.data=j;saveCache(j);S.authed=true;S.loginErr="";S.tab="home";render();
   }catch(e3){S.loginErr="Bağlantı kurulamadı.";S.kod="";S.sifre="";render();}}
 else if(a==="bpb"){ const tl=$("blTL"),us=$("blUSD"),pt=$("pbTL"),pu=$("pbUSD"); if(!tl||!us)return;
   if(v==="TL"){ tl.style.display="block"; us.style.display="none"; if(pt){pt.classList.add("on");pt.style.color="#fff";} if(pu){pu.classList.remove("on");pu.style.color="var(--muted)";} bHesap(); }
   else { tl.style.display="none"; us.style.display="block"; if(pu){pu.classList.add("on");pu.style.color="#fff";} if(pt){pt.classList.remove("on");pt.style.color="var(--muted)";} } ibanCur(v==="TL"?"TL":"USD"); }
 else if(a==="bildirsave"){
   const tlVisible = $("blTL") && $("blTL").style.display!=="none";
   if(tlVisible){
     const tlEl=$("b_tl"); const tl=parseFloat(String(tlEl.value||"").replace(",","."))||0;
     const rate=parseFloat(tlEl.getAttribute("data-rate"))||0;
     const usd=rate>0?Math.round((tl/rate)*100)/100:0;
     await submit("bildirim",{tutar:tl,pb:"₺",kur:rate,usdKarsilik:usd,tarih:$("b_tar").value,yontem:$("b_yon").value,aciklama:$("b_ack").value.trim()},el,!tl&&"Tutar girin");
   } else {
     const usd=parseFloat(String($("b_usd_in").value||"").replace(",","."))||0;
     await submit("bildirim",{tutar:usd,pb:"$",tarih:$("b_tar").value,yontem:$("b_yon").value,aciklama:$("b_ack").value.trim()},el,!usd&&"Tutar girin");
   }
 }
 else if(a==="sifresave")  await submit("sifreTalep",{makine:$("s_mak").value.trim(),photos:(window.PHOTOS||[]).slice()},el,false);
 else if(a==="servissave") await submit("servisTalep",{makine:$("v_mak").value.trim(),sorun:$("v_sorun").value.trim()},el,!$("v_sorun").value.trim()&&"Sorunu yazın");
 else if(a==="teklifsave") await submit("teklifTalep",{urun:$("t_urun").value.trim(),adet:$("t_adet").value,aciklama:$("t_ack").value.trim(),photos:(window.PHOTOS||[]).slice()},el,!$("t_urun").value.trim()&&"Makine adı yazın");
});
function successGo(){const a=S.success;S.success=null;if(a==="teklifTalep"||a==="sifreTalep"||a==="servisTalep"){S.tab="taleplerim";S.pushed=null;}else{S.pushed={t:"cari"};}}
async function submit(action,data,el,errMsg){
 if(errMsg){toast(errMsg);return;}
 const old=el.innerHTML;el.style.opacity=".7";el.textContent="Gönderiliyor…";
 try{const j=await api({action,data});
   if(j.ok===false){toast(j.error||"Gönderilemedi");el.style.opacity="1";el.innerHTML=old;return;}
   if(action==="teklifTalep"||action==="sifreTalep")window.PHOTOS=[];
   S.sheet=null;S.success=action;render();
   try{ await load(true); }catch(_){}
 }catch(e){toast("Bağlantı hatası");el.style.opacity="1";el.innerHTML=old;}
}
function clk(){const d=new Date();const el=$("clock");if(el)el.textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
clk();setInterval(clk,30000);
if(S.authed){const c=readCache();if(c){S.data=c;render();load(true);}else{load();}}else{render();}
</script>
