<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>ERSA Müşteri Portalı</title>
<meta name="theme-color" content="#111111"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ERSA Portal"/>
<style>
:root{--red:#C51515;--ink:#FFFFFF;--black:#181818;--bg:#111111;--soft:#2C2C2C;--line:#383838;--muted:#8A8A8A;--muted2:#5A5A5A;--gold:#F5A623;--green:#2ED573;--blue:#5B8DEF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.disp{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;}.mono{font-variant-numeric:tabular-nums;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;background:#0B0B0B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px 12px;}
.phone{width:380px;max-width:100%;height:812px;background:#0e0e0e;border-radius:46px;padding:5px;box-shadow:0 40px 80px rgba(0,0,0,.4);}
.inner{width:100%;height:100%;background:var(--bg);border-radius:41px;overflow:hidden;display:flex;flex-direction:column;position:relative;color:#CFCFCF;}
.sbar{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 22px 0;font-size:11px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.island{width:58px;height:15px;background:#0e0e0e;border-radius:11px;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}.scr::-webkit-scrollbar{width:0;}
.pad{padding:8px 18px 96px;}
.tap{transition:transform .12s ease;cursor:pointer;}.tap:active{transform:scale(.96);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sh{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fd{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.stg>*{animation:su .4s cubic-bezier(.2,.7,.2,1) both;}
.stg>*:nth-child(2){animation-delay:.05s}.stg>*:nth-child(3){animation-delay:.1s}.stg>*:nth-child(4){animation-delay:.15s}.stg>*:nth-child(5){animation-delay:.2s}
.h1{font-weight:800;font-size:23px;color:var(--ink);}
.sub{font-size:13px;color:var(--muted);margin-top:3px;}
.sec{font-weight:700;font-size:15px;color:var(--ink);margin:18px 0 10px;}
.c{background:#202020;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.35);}
.blk{background:var(--black);color:#fff;border-radius:20px;}
.bignum{font-weight:800;font-variant-numeric:tabular-nums;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;}
.chip-g{background:#1F9D52;color:#fff;}.chip-o{background:var(--gold);color:#181818;}.chip-b{background:#2F6FE0;color:#fff;}.chip-r{background:var(--red);color:#fff;}.chip-n{background:#2C2C2C;color:#CFCFCF;}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;box-shadow:0 8px 20px rgba(197,21,21,.28);}
.field{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:15px;color:var(--ink);background:#202020;margin-bottom:12px;outline:none;font-family:inherit;}
.field::placeholder{color:var(--muted2);}
select.field{appearance:none;-webkit-appearance:none;}
.lbl{display:block;font-size:12.5px;font-weight:700;color:#C8C8C4;margin:0 0 6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
i.ic{display:inline-flex;}i.ic svg{display:block;}
.nav{position:absolute;left:0;right:0;bottom:0;height:66px;background:#181818;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 4px calc(0px + env(safe-area-inset-bottom));}
.ns{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:var(--muted);cursor:pointer;padding-top:8px;}
.ns.on{color:var(--red);}
.ovl{position:absolute;inset:0;background:rgba(20,20,20,.55);z-index:60;display:flex;align-items:flex-end;animation:fd .2s;}
.sheet{width:100%;background:#202020;border-radius:24px 24px 0 0;padding:18px 18px 26px;animation:sh .28s cubic-bezier(.2,.8,.2,1);max-height:90%;overflow-y:auto;}
.sheet::-webkit-scrollbar{width:0;}
.circ{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);background:#181818;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:24px;z-index:80;animation:pop .25s;white-space:nowrap;border:1px solid var(--line);max-width:80%;text-align:center;}
.empty{text-align:center;color:var(--muted);padding:30px 14px;font-size:12.5px;}
.banner{background:#2A1810;color:var(--gold);border:1px solid #4a2c12;border-radius:14px;padding:13px 15px;font-size:12.5px;font-weight:600;margin-top:10px;}
.login{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:34px 26px;}
.login .logo{width:100%;max-width:236px;margin:0 auto 6px;display:block;}
.login .lt{text-align:center;font-size:12.5px;color:var(--muted);letter-spacing:2.5px;font-weight:700;margin-bottom:30px;}
.login .lerr{color:#FF6B5E;font-size:12.5px;text-align:center;margin-top:10px;min-height:16px;}
.rememberbox{display:flex;align-items:center;gap:9px;margin:2px 0 18px;cursor:pointer;color:#CFCFCF;font-size:13px;font-weight:600;}
.rememberbox input{width:18px;height:18px;accent-color:var(--red);}
.prog{height:9px;background:#2a2a2a;border-radius:6px;overflow:hidden;margin-top:8px;}.prog>div{height:100%;background:var(--green);border-radius:6px;}
.lrow{display:flex;align-items:center;gap:11px;padding:13px 0;border-top:1px solid var(--line);}.lrow:first-child{border-top:none;}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.qbtn{background:#202020;border:1px solid #2a2a2a;border-radius:16px;padding:15px 13px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s;}
.qbtn:active{transform:scale(.96);}
.qbtn .qi{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.qbtn .qt{font-size:13px;font-weight:700;color:#fff;}
.qbtn .qd{font-size:10.5px;color:var(--muted);margin-top:1px;}
.codebox{background:#11271A;border:1px solid #1F9D52;border-radius:12px;padding:11px 13px;margin-top:8px;text-align:center;}
.codebox .cv{font-size:22px;font-weight:800;color:#2ED573;letter-spacing:3px;font-variant-numeric:tabular-nums;}
@media (display-mode:standalone),(display-mode:fullscreen),(max-width:560px){
body{padding:0;background:#111111;align-items:stretch;justify-content:stretch;}
.phone{width:100%;height:100dvh;max-width:none;border-radius:0;padding:0;box-shadow:none;background:#111111;}
.inner{border-radius:0;padding-top:env(safe-area-inset-top);}
.sbar{display:none;}
}
</style></head>
<body>
<div class="phone"><div class="inner" id="app">
  <div class="sbar"><span id="clock">9:41</span><div class="island"></div><span style="font-size:10px;">▦ ▮ ▣</span></div>
  <div class="scr" id="scr"></div>
  <div id="navhost"></div><div id="sheethost"></div><div id="toasthost"></div>
</div></div>

<script src="config.js"></script>
<script>
const P={home:"M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z",doc:"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M8 13h8M8 17h8",cal:"M4 6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3H4zM4 9h14v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM8 3v3M14 3v3",list:"M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",bell:"M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0",lock:"M5 11h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1zM8 11V7a4 4 0 0 1 8 0v4",tag:"M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01",wrench:"M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",plus:"M12 5v14M5 12h14",x:"M18 6 6 18M6 6l12 12",check:"M21.5 9.5A10 10 0 1 1 16.5 3M22 5 12 14.5l-3-3",clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 7v5l3.5 2",refresh:"M21 12a9 9 0 1 1-2.6-6.3M21 4v5h-5",logout:"M16 17l5-5-5-5M21 12H9M12 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6",info:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 16v-4M12 8h.01"};
function ic(n,s,col){const d=P[n];if(!d)return"";return `<svg width="${s||16}" height="${s||16}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d.split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`;}

const S={view:"ozet",authed:false,kod:"",sifre:"",data:null,loading:false,err:"",loginErr:"",sheet:null};
try{const a=JSON.parse(localStorage.getItem("ersa_portal_auth")||"null");if(a&&a.kod){S.kod=a.kod;S.sifre=a.sifre;S.authed=true;}}catch(e){}

const $=s=>document.getElementById(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const parseDate=v=>{if(!v)return null;const d=new Date(v);return isNaN(d)?null:(d.setHours(0,0,0,0),d);};
const fmtD=d=>{const x=parseDate(d);if(!x)return"";return String(x.getDate()).padStart(2,"0")+"."+String(x.getMonth()+1).padStart(2,"0")+"."+x.getFullYear();};
const toISO=v=>{const d=parseDate(v);return d?d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"):"";};
const todayISO=()=>toISO(new Date());
const money=(n,c)=>{c=c||"$";n=n||0;const neg=n<0;return (neg?"-":"")+c+Math.round(Math.abs(n)).toLocaleString("tr-TR");};
const daysTo=d=>{const x=parseDate(d);if(!x)return null;return Math.round((x-parseDate(new Date()))/86400000);};
function chip(durum){const d=(durum||"").toLowerCase();
 if(d==="yeni")return `<span class="chip chip-o">${ic('clock',10)} Kontrol ediliyor</span>`;
 if(d==="onaylandı"||d==="onaylandi"||d==="yanıtlandı"||d==="yanitlandi"||d==="çözüldü"||d==="cozuldu"||d==="verildi")return `<span class="chip chip-g">${ic('check',10)} ${esc(durum)}</span>`;
 if(d==="reddedildi")return `<span class="chip chip-r">${esc(durum)}</span>`;
 if(d==="işlemde"||d==="islemde")return `<span class="chip chip-b">${esc(durum)}</span>`;
 if(d==="bekleniyor")return `<span class="chip chip-o">${ic('clock',10)} Bekleniyor</span>`;
 return `<span class="chip chip-n">${esc(durum||'-')}</span>`;}

async function api(payload){
 const body=Object.assign({kod:S.kod,sifre:S.sifre},payload);
 const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
 return await r.json();
}
async function load(){
 if(!window.API_URL||String(API_URL).indexOf("YAPISTIRIN")>=0){S.err="config.js içine portal Apps Script adresini yazın.";render();return;}
 S.loading=true;render();
 try{const j=await api({action:"data"});
  if(j.ok===false){ if(/kod|şifre|sifre/i.test(j.error||"")){doLogout(true);S.loginErr=j.error;render();return;} throw new Error(j.error||"Hata"); }
  S.data=j;S.err="";
 }catch(e){S.err="Bağlantı kurulamadı / adres hatalı.";}
 S.loading=false;render();
}
function toast(t){$("toasthost").innerHTML=`<div class="toast">${esc(t)}</div>`;setTimeout(()=>$("toasthost").innerHTML="",2000);}
function doLogout(silent){try{localStorage.removeItem("ersa_portal_auth");}catch(e){}S.authed=false;S.kod="";S.sifre="";S.data=null;S.view="ozet";S.sheet=null;if(!silent)render();}

/* ---------- ÖZET ---------- */
function ozetView(){
 const d=S.data||{},o=d.ozet||{};const neg=(o.bakiye||0)<0;
 const qa=(act,ic_,col,bg,t,sub)=>`<div class="qbtn" data-act="${act}"><div class="qi" style="background:${bg};">${ic(ic_,20,col)}</div><div><div class="qt">${t}</div><div class="qd">${sub}</div></div></div>`;
 return `<div class="pad stg">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:4px;">
   <div><div class="h1">Merhaba 👋</div><div class="sub">${esc(d.firma||"")}</div></div>
   <div class="circ tap" data-act="logout" style="background:#202020;">${ic('logout',18,'#EDEDED')}</div></div>
  ${S.err?`<div class="banner">${esc(S.err)}</div>`:""}
  <div class="blk" style="padding:20px 18px;margin-top:14px;">
   <div style="font-size:10px;font-weight:700;letter-spacing:1.3px;color:#9b9b95;">GÜNCEL BAKİYE ($)</div>
   <div class="bignum" style="font-size:34px;color:#fff;margin-top:4px;">${money(Math.abs(o.bakiye||0))}</div>
   <div style="font-size:12px;color:${neg?'#2ED573':'var(--gold)'};margin-top:4px;font-weight:600;">${neg?'Lehinize bakiye (fazla ödeme)':(o.bakiye?'Ödenecek bakiye':'Bakiye yok')}</div>
   <div style="display:flex;gap:9px;margin-top:15px;">
    <div style="flex:1;background:#222;border-radius:12px;padding:11px;"><div style="font-size:10px;color:#9b9b95;">Toplam Fatura</div><div class="bignum" style="font-size:16px;color:#fff;margin-top:2px;">${money(o.toplamFatura)}</div></div>
    <div style="flex:1;background:#222;border-radius:12px;padding:11px;"><div style="font-size:10px;color:#9b9b95;">Toplam Tahsilat</div><div class="bignum" style="font-size:16px;color:var(--green);margin-top:2px;">${money(o.toplamTahsilat)}</div></div></div>
  </div>
  <div class="sec">Hızlı İşlemler</div>
  <div class="qa">
   ${qa('bildir','bell','#2ED573','#11271A','Ödeme Bildir','dekont / söz')}
   ${qa('sifre','lock','#5B8DEF','#192639','Makine Şifresi','aylık kod talebi')}
   ${qa('teklif','tag','#F5A623','#2C2410','Fiyat Teklifi','makine teklifi')}
   ${qa('servis','wrench','#FF6B5E','#2A1414','Servis Kaydı','arıza / talep')}
  </div>
  <div style="font-size:11px;color:var(--muted2);text-align:center;margin-top:14px;line-height:1.5;">Tüm talepleriniz ve durumları "Talepler" sekmesinde.</div>
 </div>`;
}

/* ---------- EKSTRE ---------- */
function ekstreView(){
 const d=S.data||{},list=(d.ekstre||[]);let bak=0;
 const rows=list.map(h=>{bak+=(h.borc||0)-(h.alacak||0);const isF=(h.borc||0)>0;
  return `<div class="lrow"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13px;font-weight:700;color:#fff;">${esc(h.tip)} <span style="color:var(--muted);font-weight:600;">· ${fmtD(h.tarih)}</span></div><div style="font-size:11.5px;color:var(--muted);margin-top:1px;">${esc(h.aciklama||'')}</div></div><div style="text-align:right;"><div class="bignum" style="font-size:13.5px;color:${isF?'#FF6B5E':'#2ED573'};">${isF?'+':'−'}${money(isF?h.borc:h.alacak)}</div><div style="font-size:9.5px;color:var(--muted);">ara toplam ${money(bak)}</div></div></div>`;}).join("");
 return `<div class="pad stg"><div class="h1" style="margin-top:4px;">Cari Ekstre</div><div class="sub">Fatura ve tahsilat hareketleriniz</div>
  <div class="c" style="padding:2px 15px 8px;margin-top:14px;">${rows||'<div class="empty">Henüz hareket yok.</div>'}</div>
  <div style="font-size:11px;color:var(--muted2);margin-top:10px;text-align:center;line-height:1.5;">Güncel bakiyeniz çek/taksit ve kur farkı dahil hesaplanır; Özet'teki tutar esastır.</div>
 </div>`;
}

/* ---------- TAKSİTLER ---------- */
function taksitView(){
 const d=S.data||{},list=(d.taksitler||[]).slice().sort((a,b)=>(parseDate(a.vade)||0)-(parseDate(b.vade)||0));
 const odenen=list.filter(t=>t.durum==="Ödendi");
 const topTutar=list.reduce((s,t)=>s+(t.tutar||0),0), odTutar=odenen.reduce((s,t)=>s+(t.tutar||0),0);
 const oran=topTutar?Math.round(odTutar/topTutar*100):0;
 const rows=list.map(t=>{const od=t.durum==="Ödendi";const kg=od?null:daysTo(t.vade);
  const cc=od?`<span class="chip chip-g">${ic('check',10)} Ödendi</span>`:`<span class="chip chip-o">${ic('clock',10)} Bekliyor</span>`;
  const kgtxt=(kg==null)?'':(kg<0?`${-kg} gün gecikmiş`:(kg===0?'bugün':`${kg} gün kaldı`));
  return `<div class="lrow"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13.5px;font-weight:700;color:#fff;">${esc(t.taksit||'Taksit')}</div><div style="font-size:11.5px;color:var(--muted);margin-top:1px;">Vade ${fmtD(t.vade)}${kgtxt?' · '+kgtxt:''}</div><div style="margin-top:6px;">${cc}</div></div><div class="bignum" style="font-size:15px;color:#fff;">${money(t.tutar)}</div></div>`;}).join("");
 return `<div class="pad stg"><div class="h1" style="margin-top:4px;">Taksit Planı</div><div class="sub">${odenen.length}/${list.length} taksit ödendi</div>
  <div class="blk" style="padding:16px 18px;margin-top:14px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#bdbdb8;"><span>Ödenen</span><span class="bignum" style="color:#fff;">${money(odTutar)} / ${money(topTutar)}</span></div><div class="prog"><div style="width:${oran}%;"></div></div><div style="text-align:right;font-size:11px;color:var(--green);margin-top:6px;font-weight:700;">%${oran} tamamlandı</div></div>
  <div class="c" style="padding:2px 15px 8px;margin-top:14px;">${rows||'<div class="empty">Taksit kaydı yok.</div>'}</div>
 </div>`;
}

/* ---------- TALEPLER ---------- */
function taleplerView(){
 const d=S.data||{};
 const blok=(baslik,arr,render)=>`<div class="sec">${baslik}</div><div class="c" style="padding:2px 15px 8px;">${arr&&arr.length?arr.map(render).join(""):'<div class="empty">Kayıt yok.</div>'}</div>`;
 const bil=b=>`<div class="lrow"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13px;font-weight:700;color:#fff;">${money(b.tutar,b.pb==='TL'?'₺':'$')} · ${esc(b.yontem||'')}</div><div style="font-size:11px;color:var(--muted);">${esc(b.zaman||'')}${b.aciklama?' · '+esc(b.aciklama):''}</div></div>${chip(b.durum)}</div>`;
 const sif=s=>`<div style="padding:12px 0;border-top:1px solid var(--line);"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13px;font-weight:700;color:#fff;">${esc(s.makine||'Makine şifresi')}</div><div style="font-size:11px;color:var(--muted);">${esc(s.zaman||'')}</div></div>${chip(s.durum)}</div>${(s.durum==='Verildi'&&s.sifre)?`<div class="codebox"><div style="font-size:9.5px;color:#7fd9a3;letter-spacing:.5px;">MAKİNE ŞİFRENİZ</div><div class="cv">${esc(s.sifre)}</div></div>`:''}</div>`;
 const tek=t=>`<div class="lrow"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13px;font-weight:700;color:#fff;">${esc(t.urun||'Teklif')}${t.adet?' · '+esc(t.adet)+' adet':''}</div><div style="font-size:11px;color:var(--muted);">${esc(t.zaman||'')}${t.aciklama?' · '+esc(t.aciklama):''}</div></div>${chip(t.durum)}</div>`;
 const ser=s=>`<div class="lrow"><div style="flex:1;min-width:0;"><div class="disp" style="font-size:13px;font-weight:700;color:#fff;">${esc(s.makine||'Servis')}</div><div style="font-size:11px;color:var(--muted);">${esc(s.zaman||'')}${s.sorun?' · '+esc(s.sorun):''}</div></div>${chip(s.durum)}</div>`;
 return `<div class="pad stg"><div class="h1" style="margin-top:4px;">Talepler</div><div class="sub">Gönderdikleriniz ve durumları</div>
  ${blok("Ödeme Bildirimleri",d.bildirimler,bil)}
  ${blok("Makine Şifre Talepleri",d.sifreler,sif)}
  ${blok("Fiyat Teklifleri",d.teklifler,tek)}
  ${blok("Servis Kayıtları",d.servisler,ser)}
 </div>`;
}

/* ---------- FORMLAR ---------- */
function sheetForm(){
 if(S.sheet==="bildir") return wrap("Ödeme Bildir",`
   <div class="row2"><div><label class="lbl">Tutar</label><input id="b_tutar" class="field" type="number" placeholder="0"></div><div><label class="lbl">Para Birimi</label><select id="b_pb" class="field"><option>$</option><option>TL</option></select></div></div>
   <label class="lbl">Ödeme Tarihi (yapılan / planlanan)</label><input id="b_tar" class="field" type="date" value="${todayISO()}">
   <label class="lbl">Yöntem</label><select id="b_yon" class="field"><option>Havale/EFT</option><option>Nakit</option><option>Kredi Kartı</option><option>Çek</option></select>
   <label class="lbl">Açıklama (isteğe bağlı)</label><textarea id="b_ack" class="field" style="min-height:58px;resize:vertical;" placeholder="Örn. dekont gönderdim / gelecek hafta ödeyeceğim"></textarea>
   <button class="btnred" data-act="bildirsave">${ic('check',16,'#fff')} Bildirimi Gönder</button>`);

 if(S.sheet==="sifre"){
   const ok=S.data&&S.data.odemeBildirdi;
   if(!ok) return wrap("Makine Şifresi",`
     <div class="banner" style="margin-top:0;display:flex;gap:9px;align-items:flex-start;">${ic('info',16,'#F5A623')}<span>Makine şifresi talep edebilmek için <b>önce bu ayki ödemenizi bildirmelisiniz</b>. Ödemeniz bize ulaşıp onaylandığında şifreniz verilir.</span></div>
     <button class="btnred" style="margin-top:14px;" data-act="bildir">${ic('bell',16,'#fff')} Önce Ödeme Bildir</button>`);
   return wrap("Makine Şifresi İste",`
     <div style="font-size:12.5px;color:#bdbdbd;line-height:1.5;margin-bottom:14px;">Aylık makine açılış şifresi talebiniz firmamıza iletilir. Ödemeniz onaylanınca şifreniz "Talepler" ekranında görünür.</div>
     <label class="lbl">Makine / Seri No (isteğe bağlı)</label><input id="s_mak" class="field" placeholder="Örn. Otomatik Set #A-1024">
     <button class="btnred" data-act="sifresave">${ic('lock',16,'#fff')} Şifre Talep Et</button>`);
 }

 if(S.sheet==="teklif") return wrap("Fiyat Teklifi Al",`
   <label class="lbl">Ürün / Makine</label><input id="t_urun" class="field" placeholder="Örn. Otomatik kutu yapıştırma makinesi">
   <label class="lbl">Adet</label><input id="t_adet" class="field" type="number" placeholder="1">
   <label class="lbl">Açıklama / İhtiyaç</label><textarea id="t_ack" class="field" style="min-height:64px;resize:vertical;" placeholder="Ölçü, kapasite, teslim süresi vb."></textarea>
   <button class="btnred" data-act="teklifsave">${ic('tag',16,'#fff')} Teklif İste</button>`);

 if(S.sheet==="servis") return wrap("Servis Kaydı Aç",`
   <label class="lbl">Makine</label><input id="v_mak" class="field" placeholder="Örn. Otomatik Set #A-1024">
   <label class="lbl">Sorun / Açıklama</label><textarea id="v_sorun" class="field" style="min-height:80px;resize:vertical;" placeholder="Yaşadığınız sorunu kısaca yazın"></textarea>
   <button class="btnred" data-act="servissave">${ic('wrench',16,'#fff')} Servis Talebi Gönder</button>`);
 return "";
}
function wrap(baslik,inner){
 return `<div class="ovl"><div class="sheet">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="disp" style="font-weight:700;font-size:17px;color:#fff;">${baslik}</div><div class="circ tap" data-act="close" style="background:#2C2C2C;">${ic('x',16,'#EDEDED')}</div></div>
  ${inner}</div></div>`;
}

/* ---------- giriş ---------- */
function renderLogin(){
 $("scr").innerHTML=`<div class="login">
  <img class="logo" src="logo-white.png" alt="ersa machinery">
  <div class="lt">MÜŞTERİ PORTALI</div>
  <label class="lbl">Müşteri Kodu</label><input id="lkod" class="field" type="text" placeholder="Size verilen kod" autocapitalize="characters">
  <label class="lbl">Şifre</label><input id="lsifre" class="field" type="password" placeholder="••••••••">
  <label class="rememberbox"><input id="lrem" type="checkbox" checked> Beni hatırla</label>
  <button class="btnred" id="lbtn" data-act="login">${ic('check',16,'#fff')} Giriş Yap</button>
  <div class="lerr">${esc(S.loginErr||"")}</div>
  <div style="text-align:center;font-size:11.5px;color:var(--muted2);margin-top:18px;line-height:1.5;">Kod ve şifrenizi firmamızdan temin edebilirsiniz.</div></div>`;
 $("navhost").innerHTML="";$("sheethost").innerHTML="";
 const sp=$("lsifre");if(sp)sp.addEventListener("keydown",e=>{if(e.key==="Enter")$("lbtn").click();});
}

/* ---------- render ---------- */
function nav(){const it=[["ozet","Özet","home"],["ekstre","Ekstre","doc"],["taksitler","Taksitler","cal"],["talepler","Talepler","list"]];
 return `<div class="nav">${it.map(t=>`<div class="ns ${S.view===t[0]?'on':''}" data-act="go" data-v="${t[0]}">${ic(t[2],20,S.view===t[0]?'#C51515':'#8A8A8A')}<span>${t[1]}</span></div>`).join("")}</div>`;}
function render(){
 if(!S.authed){renderLogin();return;}
 let h;
 if(S.loading||!S.data){h=`<div class="pad"><div class="empty" style="padding-top:140px;">${ic('refresh',30,'#5A5A5A')}<div style="margin-top:10px;">Yükleniyor…</div></div></div>`;}
 else if(S.view==="ozet")h=ozetView();
 else if(S.view==="ekstre")h=ekstreView();
 else if(S.view==="taksitler")h=taksitView();
 else if(S.view==="talepler")h=taleplerView();
 else h=ozetView();
 $("scr").innerHTML=h;
 $("navhost").innerHTML=(S.data&&!S.loading)?nav():"";
 $("sheethost").innerHTML=S.sheet?sheetForm():"";
 $("scr").scrollTop=0;
}

/* ---------- olaylar ---------- */
$("app").addEventListener("click",async function(e){
 if(e.target.classList&&e.target.classList.contains("ovl")){S.sheet=null;render();return;}
 const el=e.target.closest("[data-act]");if(!el)return;
 const a=el.getAttribute("data-act");
 if(a==="go"){S.view=el.getAttribute("data-v");S.sheet=null;render();}
 else if(["bildir","sifre","teklif","servis"].includes(a)){S.sheet=a;render();}
 else if(a==="close"){S.sheet=null;render();}
 else if(a==="logout"){doLogout();}
 else if(a==="login"){
   const k=$("lkod").value.trim();const p=$("lsifre").value;const rem=$("lrem")&&$("lrem").checked;
   if(!k||!p){S.loginErr="Kod ve şifre girin.";render();return;}
   S.kod=k;S.sifre=p;el.style.opacity=".7";el.textContent="Kontrol ediliyor…";
   try{const j=await api({action:"data"});
     if(j.ok===false){S.loginErr=j.error||"Giriş başarısız.";S.kod="";S.sifre="";render();return;}
     if(rem){try{localStorage.setItem("ersa_portal_auth",JSON.stringify({kod:k,sifre:p}));}catch(e2){}}
     S.data=j;S.authed=true;S.loginErr="";S.view="ozet";render();
   }catch(e3){S.loginErr="Bağlantı kurulamadı.";S.kod="";S.sifre="";render();}}
 else if(a==="bildirsave") await submit("bildirim",{tutar:$("b_tutar").value,pb:$("b_pb").value,tarih:$("b_tar").value,yontem:$("b_yon").value,aciklama:$("b_ack").value.trim()},el,!$("b_tutar").value&&"Tutar girin");
 else if(a==="sifresave")  await submit("sifreTalep",{makine:$("s_mak").value.trim()},el,false);
 else if(a==="teklifsave") await submit("teklifTalep",{urun:$("t_urun").value.trim(),adet:$("t_adet").value,aciklama:$("t_ack").value.trim()},el,!$("t_urun").value.trim()&&"Ürün/makine yazın");
 else if(a==="servissave") await submit("servisTalep",{makine:$("v_mak").value.trim(),sorun:$("v_sorun").value.trim()},el,!$("v_sorun").value.trim()&&"Sorunu yazın");
});
async function submit(action,data,el,errMsg){
 if(errMsg){toast(errMsg);return;}
 const old=el.innerHTML;el.style.opacity=".7";el.textContent="Gönderiliyor…";
 try{const j=await api({action,data});
   if(j.ok===false){toast(j.error||"Gönderilemedi");el.style.opacity="1";el.innerHTML=old;return;}
   S.sheet=null;toast("Talebiniz alındı, teşekkürler");await load();S.view="talepler";render();
 }catch(e){toast("Bağlantı hatası");el.style.opacity="1";el.innerHTML=old;}
}
function clk(){const d=new Date();const el=$("clock");if(el)el.textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
clk();setInterval(clk,30000);
if(S.authed){load();}else{render();}
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body></html>
