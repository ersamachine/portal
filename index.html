<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<meta name="theme-color" content="#111111"/>
<link rel="manifest" href="manifest.webmanifest"/>

<link rel="apple-touch-icon" href="apple-touch-icon.png"/>

<style>
:root{--red:#C51515;--ink:#FFFFFF;--black:#181818;--bg:#111111;--soft:#2C2C2C;--line:#383838;--muted:#8A8A8A;--muted2:#5A5A5A;--gold:#F5A623;--green:#2ED573;--blue:#5B8DEF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
.disp{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;}.mono{font-variant-numeric:tabular-nums;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;background:#0B0B0B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px 12px;}
.phone{width:380px;max-width:100%;height:812px;background:#0e0e0e;border-radius:46px;padding:5px;box-shadow:0 40px 80px rgba(0,0,0,.4);}
.inner{width:100%;height:100%;background:var(--bg);border-radius:41px;overflow:hidden;display:flex;flex-direction:column;position:relative;color:#CFCFCF;}
.sbar{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 22px 0;font-size:11px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.island{width:58px;height:15px;background:#0e0e0e;border-radius:11px;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}.scr::-webkit-scrollbar{width:0;}
.pad{padding:6px 18px 30px;}
.tap{transition:transform .12s ease;cursor:pointer;}.tap:active{transform:scale(.97);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sh{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fd{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.stg>*{animation:su .4s cubic-bezier(.2,.7,.2,1) both;}
.stg>*:nth-child(2){animation-delay:.04s}.stg>*:nth-child(3){animation-delay:.08s}.stg>*:nth-child(4){animation-delay:.12s}.stg>*:nth-child(5){animation-delay:.16s}
.h1{font-weight:800;font-size:23px;color:var(--ink);}
.sub{font-size:13px;color:var(--muted);margin-top:3px;}
.sec{font-weight:700;font-size:15px;color:var(--ink);margin:18px 0 10px;}
.c{background:#202020;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.35);}
.blk{background:var(--black);color:#fff;border-radius:20px;}
.ct{font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs{font-size:11.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.circ{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;}
.chip-r{background:var(--red);color:#fff;}.chip-g{background:#1F9D52;color:#fff;}.chip-n{background:#2C2C2C;color:#CFCFCF;}.chip-b{background:#2F6FE0;color:#fff;}.chip-o{background:var(--gold);color:#181818;}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;box-shadow:0 8px 20px rgba(197,21,21,.28);}
.btndel{width:100%;background:transparent;color:#FF6B5E;border:1.5px solid #5a2a2a;border-radius:14px;padding:12px;font-size:13.5px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-top:10px;}
.bignum{font-weight:800;font-variant-numeric:tabular-nums;}
.field{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14.5px;color:var(--ink);background:#202020;margin-bottom:12px;outline:none;font-family:inherit;}
.field::placeholder{color:var(--muted2);}
select.field{appearance:none;-webkit-appearance:none;}
.lbl{display:block;font-size:12.5px;font-weight:700;color:#C8C8C4;margin:0 0 6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
i.ic{display:inline-flex;}i.ic svg{display:block;}
.ovl{position:absolute;inset:0;background:rgba(20,20,20,.55);z-index:60;display:flex;align-items:flex-end;animation:fd .2s;}
.sheet{width:100%;background:#202020;border-radius:24px 24px 0 0;padding:18px 18px 26px;animation:sh .28s cubic-bezier(.2,.8,.2,1);max-height:90%;overflow-y:auto;}
.sheet::-webkit-scrollbar{width:0;}
.toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);background:#181818;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:24px;z-index:80;animation:pop .25s;white-space:nowrap;border:1px solid var(--line);}
.empty{text-align:center;color:var(--muted);padding:40px 14px;font-size:13px;}
.banner{background:#2A1810;color:var(--gold);border:1px solid #4a2c12;border-radius:14px;padding:13px 15px;font-size:12.5px;font-weight:600;margin-top:10px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.back{display:inline-flex;align-items:center;gap:3px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;}
.addbtn{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
.search{position:relative;margin-top:12px;}
.search input{padding-left:38px;margin-bottom:0;}
.search .si{position:absolute;left:13px;top:13px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.modcard{background:#202020;border:1px solid #2a2a2a;border-radius:16px;padding:14px 13px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s;}
.modcard:active{transform:scale(.97);}
.modcard .mi{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.modcard .ml{font-size:13px;font-weight:700;color:#fff;}
.modcard .mv{font-size:10.5px;color:var(--muted);margin-top:1px;}
.lrow{display:flex;align-items:center;gap:11px;padding:13px 0;border-top:1px solid var(--line);cursor:pointer;}
.lrow:first-child{border-top:none;}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi{background:#202020;border-radius:16px;padding:13px 14px;}
.kpi .kl{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--muted);}
.kpi .kv{font-size:22px;font-weight:800;color:#fff;margin-top:3px;line-height:1;}
.kpi .kc{font-size:10px;color:var(--muted2);margin-top:3px;}
.login{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:34px 26px;}
.login .logo{width:100%;max-width:248px;margin:0 auto 8px;display:block;}
.login .lt{text-align:center;font-size:13px;color:var(--muted);letter-spacing:2px;font-weight:700;margin-bottom:34px;}
.login .lerr{color:#FF6B5E;font-size:12.5px;text-align:center;margin-top:10px;min-height:16px;}
.rememberbox{display:flex;align-items:center;gap:9px;margin:2px 0 18px;cursor:pointer;color:#CFCFCF;font-size:13px;font-weight:600;}
.rememberbox input{width:18px;height:18px;accent-color:var(--red);}
@media (display-mode:standalone),(display-mode:fullscreen),(max-width:560px){
body{padding:0;background:#111111;align-items:stretch;justify-content:stretch;}
.phone{width:100%;height:100dvh;max-width:none;border-radius:0;padding:0;box-shadow:none;background:#111111;}
.inner{border-radius:0;padding-top:env(safe-area-inset-top);}
.sbar{display:none;}
.pad{padding-bottom:calc(30px + env(safe-area-inset-bottom));}
}
</style></head>
<body>
<div class="phone"><div class="inner" id="app">
  <div class="sbar"><span id="clock">9:41</span><div class="island"></div><span style="font-size:10px;">▦ ▮ ▣</span></div>
  <div class="scr" id="scr"></div>
  <div id="sheethost"></div><div id="toasthost"></div>
</div></div>

<script src="config.js"></script>
<script>
const P={home:"M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z",users:"M16 19v-1a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v1M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 19v-1a4 4 0 0 0-3-3.8",user:"M5 20v-1a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v1M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",receipt:"M5 3v18l2-1.5L9 21l2-1.5L13 21l2-1.5L17 21l2-1.5V3l-2 1.5L15 3l-2 1.5L11 3 9 4.5 7 3zM8 8h8M8 12h8",wallet:"M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM16 12.5h3v3h-3a1.5 1.5 0 0 1 0-3z",scroll:"M6 4a2 2 0 0 0-2 2v1h4V6a2 2 0 0 0-2-2zM6 4h11a2 2 0 0 1 2 2v11M8 7v11a2 2 0 0 0 2 2h9a1 1 0 0 0 1-1v-2H10M11 9h6M11 13h6",cal:"M4 6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3H4zM4 9h14v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM8 3v3M14 3v3",cash:"M3 6h18v12H3zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM6 9v.01M18 15v.01",swap:"M7 10l-4 4 4 4M3 14h14M17 14l4-4-4-4M21 10H7",doc:"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M8 13h8M8 17h8",plus:"M12 5v14M5 12h14",x:"M18 6 6 18M6 6l12 12",check:"M21.5 9.5A10 10 0 1 1 16.5 3M22 5 12 14.5l-3-3",clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 7v5l3.5 2",search:"M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3",refresh:"M21 12a9 9 0 1 1-2.6-6.3M21 4v5h-5",logout:"M16 17l5-5-5-5M21 12H9M12 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6",cl:"m15 6-6 6 6 6",down:"M12 5v14M19 12l-7 7-7-7",up:"M12 19V5M5 12l7-7 7 7",trash:"M4 7h16M6 7l1 13h10l1-13M9 7V4h6v3M10 11v6M14 11v6",chart:"M3 3v18h18M7 14v4M12 9v9M17 5v13"};
function ic(n,s,col){const d=P[n];if(!d)return"";return `<svg width="${s||16}" height="${s||16}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d.split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`;}

const LIST={
 personel:["İlknur Özdemir","Ertuğrul Aksoy"],
 odemeTuru:["Resmi","EFT","Kredi Kartı","Gayriresmi","Nakit"],
 cekDurum:["Bekliyor","Tahsil Edildi"],
 taksitDurum:["Bekliyor","Ödendi"],
 kasaIslem:["Nakit","Çek","Havale","EFT"],
 kasaYon:["Giriş","Çıkış"],
 ortakTur:["Kredi Kartı","Nakit","EFT","Havale"],
 ortakYon:["Şirkete Verildi","Geri Alındı","Ciro Edildi","Senet Olarak Alınacak"],
 pb:["TL","$"]
};
let DATA={panel:{},cariOzet:[],musteriler:[],faturalar:[],odemeler:[],cekler:[],taksitler:[],kasa:[],ortak:[]};
const S={view:"home",sheet:null,editing:null,sub:null,q:"",loading:true,err:"",authed:false,loginErr:"",delArm:false};
const AUTH={email:"info@ersamachinery.com",pass:"Ertu1q2w3e4r5t**"};
function getRemember(){try{return localStorage.getItem("ersa_cari_auth")==="1";}catch(e){return false;}}
S.authed=getRemember();

const $=s=>document.getElementById(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const parseDate=v=>{if(!v)return null;const d=new Date(v);return isNaN(d)?null:(d.setHours(0,0,0,0),d);};
const fmtD=d=>{const x=parseDate(d);if(!x)return"";return String(x.getDate()).padStart(2,"0")+"."+String(x.getMonth()+1).padStart(2,"0")+"."+x.getFullYear();};
const toISO=v=>{const d=parseDate(v);return d?d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"):"";};
const todayISO=()=>toISO(new Date());
const money=(n,c)=>{c=c||"$";n=n||0;const neg=n<0;return (neg?"-":"")+c+Math.round(Math.abs(n)).toLocaleString("tr-TR");};
const pct=n=>Math.round((n||0)*100)+"%";
const bekleyenCek=()=>DATA.cekler.filter(c=>c.durum!=="Tahsil Edildi").length;
const bekleyenTaksit=()=>DATA.taksitler.filter(t=>t.durum!=="Ödendi").length;

async function load(){
 if(!window.API_URL||String(API_URL).indexOf("YAPISTIRIN")>=0){S.loading=false;S.err="config.js içine Apps Script adresinizi yazın.";render();return;}
 S.loading=true;render();
 try{
  const r=await fetch(API_URL,{method:"GET"});const j=await r.json();
  if(j.ok===false)throw new Error(j.error||"Hata");
  ["panel","cariOzet","musteriler","faturalar","odemeler","cekler","taksitler","kasa","ortak"].forEach(k=>DATA[k]=j[k]||DATA[k]);
  S.err="";
 }catch(e){S.err="Bağlantı kurulamadı / adres hatalı.";}
 S.loading=false;render();
}
async function post(payload){
 const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
 const j=await r.json(); if(j.ok===false)throw new Error(j.error||"Hata"); return j;
}
function toast(t){$("toasthost").innerHTML=`<div class="toast">${esc(t)}</div>`;setTimeout(()=>$("toasthost").innerHTML="",1700);}

/* ---------- modüller ---------- */
const MODS=[
 {id:"panel",t:"Kontrol Paneli",ic:"home",col:"#5B8DEF",bg:"#192639",sub:()=>"özet rakamlar"},
 {id:"cariozet",t:"Cari Özet",ic:"users",col:"#2ED573",bg:"#11271A",sub:()=>DATA.cariOzet.length+" müşteri"},
 {id:"musteriler",t:"Müşteriler",ic:"user",col:"#B98BFF",bg:"#221A33",sub:()=>DATA.musteriler.length+" kayıt"},
 {id:"faturalar",t:"Faturalar",ic:"receipt",col:"#FF6B5E",bg:"#2A1414",sub:()=>DATA.faturalar.length+" kayıt"},
 {id:"odemeler",t:"Ödemeler",ic:"wallet",col:"#2ED573",bg:"#11271A",sub:()=>DATA.odemeler.length+" kayıt"},
 {id:"cekler",t:"Çek Takibi",ic:"scroll",col:"#F5A623",bg:"#2C2410",sub:()=>bekleyenCek()+" bekleyen"},
 {id:"taksitler",t:"Taksitler",ic:"cal",col:"#5B8DEF",bg:"#192639",sub:()=>bekleyenTaksit()+" bekleyen"},
 {id:"kasa",t:"Kasa",ic:"cash",col:"#22D3C5",bg:"#0E2A28",sub:()=>money(DATA.panel.kasaTL,"₺")},
 {id:"ortak",t:"Ortak Cari",ic:"swap",col:"#B98BFF",bg:"#221A33",sub:()=>DATA.ortak.length+" hareket"},
 {id:"ekstre",t:"Cari Ekstre",ic:"doc",col:"#9CA3AF",bg:"#1F1F1F",sub:()=>"müşteri seç"}
];

/* ---------- HOME (hub) ---------- */
function homeView(){
 const p=DATA.panel;
 return `<div class="pad stg">
  <div class="topbar">
   <div><div class="h1">Merhaba Ertuğrul 👋</div><div class="sub">Bugünkü durum</div></div>
   <div class="circ tap" data-act="logout" style="background:#202020;">${ic('logout',18,'#EDEDED')}</div>
  </div>
  ${S.err?`<div class="banner">${esc(S.err)}</div>`:""}
  <div class="blk" style="padding:17px 18px;margin-top:14px;">
   <div style="font-size:10px;font-weight:700;letter-spacing:1.3px;color:#9b9b95;">NET ALACAK ($)</div>
   <div class="bignum" style="font-size:30px;color:#fff;margin-top:3px;">${money(p.netAlacak)}</div>
   <div style="display:flex;gap:8px;margin-top:13px;">
    <div style="flex:1;background:#222;border-radius:11px;padding:9px;"><div style="font-size:9.5px;color:#9b9b95;">Tahsilat</div><div class="bignum" style="font-size:15px;color:var(--green);margin-top:1px;">${pct(p.oran)}</div></div>
    <div style="flex:1;background:#222;border-radius:11px;padding:9px;"><div style="font-size:9.5px;color:#9b9b95;">Bekleyen çek</div><div class="bignum" style="font-size:15px;color:var(--gold);margin-top:1px;">${money(p.bekleyen)}</div></div>
    <div style="flex:1;background:#222;border-radius:11px;padding:9px;"><div style="font-size:9.5px;color:#9b9b95;">Kasa TL</div><div class="bignum" style="font-size:15px;color:#fff;margin-top:1px;">${money(p.kasaTL,'₺')}</div></div>

  <div style="text-align:center;margin-top:16px;"><span class="tap" data-act="refresh" style="font-size:12px;color:var(--muted);font-weight:600;">${ic('refresh',13,'#8A8A8A')} Verileri yenile</span></div>
 </div>`;

/* ---------- başlık (modül içi) ---------- */
function head(title,type){
 return `<div class="topbar" style="margin-bottom:6px;">
   <div class="back" data-act="home">${ic('cl',18)} Modüller</div>
   ${type?`<div class="addbtn" data-act="add" data-type="${type}">${ic('plus',15,'#fff')} Ekle</div>`:''}
  </div><div class="h1" style="font-size:21px;">${title}</div>`;
}

/* ---------- PANEL (kontrol paneli) ---------- */
function panelView(){
 const p=DATA.panel;const kpi=(l,v,c,col)=>`<div class="kpi"><div class="kl">${l}</div><div class="kv" style="color:${col||'#fff'}">${v}</div><div class="kc">${c}</div></div>`;
 return `<div class="pad stg">${head("Kontrol Paneli")}
  <div class="sec" style="margin-top:12px;">Fatura & Tahsilat</div>
  <div class="kgrid">${kpi("TOPLAM FATURA",money(p.fatura),"tüm müşteriler")}${kpi("TAHSİLAT",money(p.tahsilat),"ödeme+çek+taksit",'#2ED573')}${kpi("TAHSİLAT ORANI",pct(p.oran),"tahsilat / fatura")}${kpi("KUR FARKI",money(p.kurFarki),"borca eklenen")}</div>
  <div class="sec">Çek & Alacak</div>
  <div class="kgrid">${kpi("BEKLEYEN ÇEK",money(p.bekleyen),"tahsil edilmemiş",p.bekleyen?'var(--gold)':'#fff')}${kpi("30 GÜN ÇEK",money(p.gun30),"vadesi yaklaşan",p.gun30?'var(--gold)':'#fff')}${kpi("NET ALACAK",money(p.netAlacak),"kur farkı dahil")}${kpi("MÜŞTERİ",DATA.cariOzet.length,"cari hesap")}</div>
  <div class="sec">Kasa</div>
  <div class="c" style="padding:4px 15px;">
   <div style="display:flex;justify-content:space-between;padding:11px 0;"><span style="font-size:13px;color:#CFCFCF;">Nakit TL</span><span class="bignum" style="font-size:15px;color:#fff;">${money(p.kasaTL,'₺')}</span></div>
   <div style="display:flex;justify-content:space-between;padding:11px 0;border-top:1px solid var(--line);"><span style="font-size:13px;color:#CFCFCF;">Nakit USD</span><span class="bignum" style="font-size:15px;color:#fff;">${money(p.kasaUSD)}</span></div>
  </div>
 </div>`;
}

/* ---------- liste modülleri ---------- */
function avatar(name){return `<div class="circ" style="width:38px;height:38px;background:#2E2E2E;font-weight:800;color:#EDEDED;">${esc((name||'?').trim().charAt(0).toUpperCase())}</div>`;}
const LISTS={
 musteriler:{title:"Müşteriler",type:"musteri",data:()=>DATA.musteriler,ph:"Müşteri ara…",
  match:(m,q)=>(m.sirket+m.sorumlu).toLowerCase().includes(q),
  row:m=>`<div class="lrow" data-act="edit" data-type="musteri" data-row="${m._row}">${avatar(m.sirket)}<div style="flex:1;min-width:0;"><div class="ct">${esc(m.sirket)}</div><div class="cs">${esc(m.sorumlu||'')}${m.telefon?' · '+esc(m.telefon):''}</div></div>${m.acilis?`<div style="font-size:11px;color:var(--muted);">açılış ${money(m.acilis)}</div>`:''}</div>`},

}

/* ---------- render ---------- */
const LISTVIEWS=["musteriler","faturalar","odemeler","cekler","taksitler","kasa","ortak"];
function render(){
 if(!S.authed){renderLogin();return;}
 let h;
 if(S.loading){h=`<div class="pad"><div class="empty" style="padding-top:130px;">${ic('refresh',30,'#5A5A5A')}<div style="margin-top:10px;">Yükleniyor…</div></div></div>`;}
 else if(S.view==="home")h=homeView();
 else if(S.view==="panel")h=panelView();
 else if(S.view==="cariozet")h=cariOzetView();
 else if(S.view==="ekstre")h=ekstreView();
 else if(LISTVIEWS.includes(S.view))h=listView(S.view);
 else h=homeView();
 $("scr").innerHTML=h;
 $("sheethost").innerHTML=S.sheet?sheetForm():'';
 if(!S.loading){
  if(LISTVIEWS.includes(S.view)){renderMList();bindSearch(renderMList);}
  else if(S.view==="cariozet"){renderOzet();bindSearch(renderOzet);}
  else if(S.view==="ekstre"&&!S.sub){renderEkstrePicker();bindSearch(renderEkstrePicker);}
 }
 $("scr").scrollTop=0;
}
function bindSearch(fn){const s=$("msearch");if(s)s.oninput=e=>{S.q=e.target.value;fn();};}

/* ---------- olaylar ---------- */
$("app").addEventListener("click",async function(e){
 if(e.target.classList&&e.target.classList.contains("ovl")){S.sheet=null;S.delArm=false;render();return;}
 const el=e.target.closest("[data-act]"); if(!el)return;
 const a=el.getAttribute("data-act");
 if(a==="open"){S.view=el.getAttribute("data-v");S.q="";S.sub=null;render();}
 else if(a==="home"){S.view="home";S.q="";S.sub=null;render();}
 else if(a==="refresh"){load();}
 else if(a==="ekstre"){S.view="ekstre";S.sub=el.getAttribute("data-m");render();}
 else if(a==="ekstreback"){S.sub=null;S.q="";render();}
 else if(a==="add"){S.sheet=el.getAttribute("data-type");S.editing=null;S.delArm=false;render();}
 else if(a==="edit"){const type=el.getAttribute("data-type"),row=el.getAttribute("data-row");const arr={musteri:DATA.musteriler,fatura:DATA.faturalar,odeme:DATA.odemeler,cek:DATA.cekler,taksit:DATA.taksitler,kasa:DATA.kasa,ortak:DATA.ortak}[type];S.editing=arr.find(x=>String(x._row)===row);S.sheet=type;S.delArm=false;render();}
 else if(a==="close"){S.sheet=null;S.delArm=false;render();}
 else if(a==="login"){const em=$("lemail").value.trim().toLowerCase();const pw=$("lpass").value;const rem=$("lremember")&&$("lremember").checked;
   if(em===AUTH.email.toLowerCase()&&pw===AUTH.pass){if(rem){try{localStorage.setItem("ersa_cari_auth","1");}catch(e){}}S.authed=true;S.loginErr="";load();}else{S.loginErr="E-posta veya şifre hatalı.";render();}}
 else if(a==="logout"){try{localStorage.removeItem("ersa_cari_auth");}catch(e){}S.authed=false;S.view="home";S.sheet=null;S.loginErr="";render();}
 else if(a==="save"){
   const F=FORMS[S.sheet];const d=F.collect();const err=F.valid(d);if(err){toast(err);return;}
   el.style.opacity=".7";el.textContent="Kaydediliyor…";
   try{await post({action:"save",type:S.sheet,row:S.editing?S.editing._row:null,data:d});S.sheet=null;S.delArm=false;toast(S.editing?"Güncellendi":"Eklendi");await load();}
   catch(err2){toast("Hata: "+err2.message);el.style.opacity="1";el.innerHTML=`${ic('check',16,'#fff')} Tekrar dene`;}}
 else if(a==="del"){
   if(!S.delArm){S.delArm=true;render();return;}
   el.style.opacity=".7";el.textContent="Siliniyor…";
   try{await post({action:"delete",type:S.sheet,row:S.editing._row});S.sheet=null;S.delArm=false;toast("Silindi");await load();}
   catch(err3){toast("Hata: "+err3.message);el.style.opacity="1";}}
});
function clk(){const d=new Date();const el=$("clock");if(el)el.textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
clk();setInterval(clk,30000);
if(S.authed){load();}else{S.loading=false;render();}
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body></html>
